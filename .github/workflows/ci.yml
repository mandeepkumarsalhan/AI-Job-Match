name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore backend/backend.csproj

      - name: Build
        run: dotnet build backend/backend.csproj --no-restore --configuration Release

      - name: Restore Tests
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Test
        run: dotnet test backend.Tests/backend.Tests.csproj --no-restore --verbosity normal
        env:
          API_KEY: ${{ secrets.NAV_API_KEY }}
