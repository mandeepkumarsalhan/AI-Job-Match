trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release

steps:
  - task: UseDotNet@2
    displayName: Setup .NET
    inputs:
      packageType: sdk
      version: 10.0.x

  - script: dotnet restore backend/backend.csproj
    displayName: Restore

  - script: dotnet build backend/backend.csproj --no-restore --configuration $(buildConfiguration)
    displayName: Build

  - script: dotnet restore backend.Tests/backend.Tests.csproj
    displayName: Restore Tests

  - script: dotnet test backend.Tests/backend.Tests.csproj --no-restore --verbosity normal --logger trx --results-directory $(Agent.TempDirectory)/TestResults
    displayName: Test
    env:
      API_KEY: $(NAV_API_KEY)

  - task: PublishTestResults@2
    displayName: Publish Test Results
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: VSTest
      testResultsFiles: "$(Agent.TempDirectory)/TestResults/*.trx"
